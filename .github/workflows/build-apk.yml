name: Build APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system deps
        run: |
          sudo apt update
          sudo apt install -y python3-pip python3-venv git zip unzip \
            openjdk-17-jdk autoconf libtool pkg-config zlib1g-dev \
            libncurses-dev cmake libffi-dev libssl-dev

      - name: Install buildozer
        run: |
          pip install --user buildozer cython

      - name: Pre-install Android SDK build-tools
        run: |
          export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
          export PATH=$PATH:~/.local/bin
          yes | ~/.local/bin/buildozer init 2>/dev/null || true
          # Set ANDROID_HOME for buildozer
          mkdir -p ~/.buildozer/android/platform/android-sdk
          # Download cmdline-tools if needed
          if [ ! -f ~/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin/sdkmanager ]; then
            mkdir -p ~/.buildozer/android/platform/android-sdk/cmdline-tools
            cd /tmp
            curl -sL -o cmdline-tools.zip "https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip"
            unzip -q cmdline-tools.zip -d cmdline-tools-tmp
            mv cmdline-tools-tmp/cmdline-tools ~/.buildozer/android/platform/android-sdk/cmdline-tools/latest
            rm -rf cmdline-tools-tmp cmdline-tools.zip
          fi
          # Accept licenses
          yes | ~/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin/sdkmanager --sdk_root=$HOME/.buildozer/android/platform/android-sdk --licenses 2>/dev/null || true
          # Install platform-tools and build-tools (using proper quoting via array)
          yes | ~/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin/sdkmanager --sdk_root=$HOME/.buildozer/android/platform/android-sdk "platform-tools" "build-tools;37.0.0" "platforms;android-34" 2>/dev/null || true

      - name: Build APK
        run: |
          export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
          export PATH=$PATH:~/.local/bin
          buildozer android debug 2>&1

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: CozyGames-APK
          path: bin/*.apk
