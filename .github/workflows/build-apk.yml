name: Build APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system deps
        run: |
          sudo apt update
          sudo apt install -y python3-pip python3-venv git zip unzip \
            openjdk-17-jdk autoconf libtool pkg-config zlib1g-dev \
            libncurses-dev cmake libffi-dev libssl-dev

      - name: Install buildozer
        run: |
          pip install --user buildozer cython

      - name: Set up Android SDK manually (work around buildozer shell quoting bug)
        run: |
          export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
          export PATH=$PATH:~/.local/bin

          SDK_DIR=$HOME/.buildozer/android/platform/android-sdk
          mkdir -p "$SDK_DIR"

          # Download command-line tools (old layout with tools/bin/sdkmanager)
          cd /tmp
          curl -sL -o cmdline-tools.zip "https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip"
          unzip -q cmdline-tools.zip
          # Copy tools/ into SDK_DIR (this gives us tools/bin/sdkmanager)
          cp -r cmdline-tools/* "$SDK_DIR/"
          rm -rf cmdline-tools cmdline-tools.zip

          # Accept all licenses
          yes | "$SDK_DIR/tools/bin/sdkmanager" --sdk_root="$SDK_DIR" --licenses 2>/dev/null || true

          # Install required packages (properly quoted with double quotes)
          yes | "$SDK_DIR/tools/bin/sdkmanager" --sdk_root="$SDK_DIR" \
            "platform-tools" \
            "build-tools;37.0.0" \
            "platforms;android-34" 2>&1 || true

          echo "SDK setup done"
          ls -la "$SDK_DIR/build-tools/" || echo "No build-tools dir"

      - name: Build APK
        run: |
          export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
          export PATH=$PATH:~/.local/bin
          buildozer android debug 2>&1

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: CozyGames-APK
          path: bin/*.apk
